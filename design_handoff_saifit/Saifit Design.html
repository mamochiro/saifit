<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Saifit · GymPal — Dark Glass Design System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style id="saifit-tokens">
/* ─────────────────────────────────────────────────────────────
   Saifit / GymPal — Dark glassmorphism tokens
   ───────────────────────────────────────────────────────────── */

@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=K2D:wght@300;400;500;600;700&display=swap');

:root {
  /* surfaces */
  --bg:           oklch(8% 0.005 240);
  --bg-2:         oklch(11% 0.008 250);
  --glass:        rgba(255,255,255,0.06);
  --glass-2:      rgba(255,255,255,0.09);
  --glass-line:   rgba(255,255,255,0.10);
  --glass-line-2: rgba(255,255,255,0.16);

  /* ink */
  --ink:        oklch(95% 0.003 90);
  --ink-mute:   oklch(72% 0.004 90);
  --ink-soft:   oklch(55% 0.004 90);
  --ink-faint:  oklch(38% 0.005 250);

  /* accents */
  --violet:        oklch(72% 0.20 270);
  --violet-deep:   oklch(60% 0.20 240);
  --violet-bright: oklch(78% 0.20 285);
  --violet-glow:   oklch(72% 0.20 270 / 25%);
  --violet-edge:   oklch(72% 0.20 270 / 45%);
  --danger:        oklch(62% 0.20 25);
  --line-green:    #00B900;

  /* radius */
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
}

/* ───────── Reset just enough ───────── */
.saifit-root, .saifit-root * { box-sizing: border-box; }
.saifit-root {
  font-family: 'K2D', system-ui, sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ───────── Backdrop ───────── */
.saifit-bg {
  background:
    radial-gradient(140% 70% at 80% -10%, rgba(120, 90, 255, 0.10), transparent 60%),
    radial-gradient(110% 70% at -10% 110%, rgba(60, 110, 220, 0.08), transparent 55%),
    var(--bg);
  position: relative;
  overflow: hidden;
}
.saifit-bg::before {
  /* faint grid texture */
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}
.saifit-bg::after {
  /* film grain */
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.18;
  mix-blend-mode: overlay;
  pointer-events: none;
}

/* ───────── Glass primitives ───────── */
.glass {
  background: var(--glass);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
          backdrop-filter: blur(24px) saturate(140%);
  border: 1px solid var(--glass-line);
  border-radius: var(--r-lg);
  position: relative;
  overflow: hidden;
}
.glass::before {
  /* top edge highlight */
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  pointer-events: none;
}
.glass-glow {
  box-shadow:
    0 0 0 1px var(--violet-glow),
    0 24px 60px -20px rgba(120, 100, 255, 0.30);
}
.glass-glow::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(130, 100, 255, 0.10), transparent 60%);
  pointer-events: none;
  border-radius: inherit;
}

/* ───────── Buttons ───────── */
.btn-primary {
  height: 56px;
  border-radius: var(--r-md);
  font-family: 'K2D', system-ui, sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: white;
  border: 0;
  cursor: pointer;
  background: linear-gradient(135deg, oklch(65% 0.22 280), oklch(60% 0.20 240));
  box-shadow:
    0 1px 0 rgba(255,255,255,0.18) inset,
    0 -8px 20px rgba(60, 30, 180, 0.35) inset,
    0 12px 30px -10px rgba(120, 90, 255, 0.55);
  position: relative;
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
}
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:active, .btn-primary.is-pressed {
  transform: translateY(1px);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.10) inset,
    0 -4px 14px rgba(60, 30, 180, 0.45) inset,
    0 6px 16px -8px rgba(120, 90, 255, 0.55);
}

.btn-glass {
  height: 56px;
  border-radius: var(--r-md);
  background: var(--glass-2);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-line-2);
  color: var(--ink);
  font-family: 'K2D', system-ui, sans-serif;
  font-weight: 600; font-size: 15px;
  display: inline-flex; align-items: center; justify-content: center; gap: 12px;
  cursor: pointer;
}

.btn-line {
  height: 56px;
  border-radius: var(--r-md);
  background: var(--line-green);
  color: #fff;
  border: 0;
  font-family: 'K2D', system-ui, sans-serif;
  font-weight: 700; font-size: 15px;
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer;
  box-shadow: 0 8px 22px -10px rgba(0, 185, 0, 0.55);
}

/* ───────── Inputs ───────── */
.glass-input {
  height: 52px;
  border-radius: var(--r-md);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-line);
  color: var(--ink);
  font-family: 'K2D', system-ui, sans-serif;
  font-size: 15px;
  padding: 0 16px;
  width: 100%;
  display: flex; align-items: center; gap: 10px;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.glass-input.is-focused {
  border-color: var(--violet-edge);
  box-shadow: 0 0 0 4px rgba(140, 100, 255, 0.15);
  background: rgba(255,255,255,0.06);
}
.glass-input input {
  background: transparent; border: 0; outline: 0; color: inherit;
  font: inherit; flex: 1; min-width: 0;
}
.glass-input input::placeholder { color: var(--ink-soft); }

/* ───────── Type ───────── */
.t-num   { font-family: 'Chakra Petch', monospace; font-variant-numeric: tabular-nums; font-weight: 700; letter-spacing: -0.02em; }
.t-label { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); }
.t-th    { font-family: 'K2D', system-ui, sans-serif; }

/* ───────── Pills / chips ───────── */
.pill {
  height: 34px; padding: 0 14px;
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-line);
  color: var(--ink-mute);
  font-family: 'K2D'; font-size: 13px; font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
}
.pill.is-active {
  background: rgba(140,100,255,0.12);
  border-color: var(--violet-edge);
  color: var(--ink);
  box-shadow: 0 0 0 1px var(--violet-glow), inset 0 1px 0 rgba(255,255,255,0.08);
}
.pill-sm {
  height: 24px; padding: 0 10px; font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ───────── Bottom nav ───────── */
.tabbar {
  display: grid; grid-template-columns: repeat(4, 1fr);
  height: 76px;
  border-radius: 26px;
  background: rgba(20, 22, 30, 0.55);
  -webkit-backdrop-filter: blur(28px) saturate(160%);
          backdrop-filter: blur(28px) saturate(160%);
  border: 1px solid var(--glass-line);
  position: relative;
}
.tabbar::before {
  content: '';
  position: absolute; top: 0; left: 12px; right: 12px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.20), transparent);
}
.tab {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; color: var(--ink-soft);
  font-family: 'K2D'; font-size: 10px; font-weight: 500;
  cursor: pointer; position: relative;
}
.tab.is-active { color: var(--ink); }
.tab.is-active .tab-dot {
  background: var(--violet);
  box-shadow: 0 0 14px var(--violet);
}
.tab-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(255,255,255,0.18);
  margin-top: 2px;
}

/* ───────── Heatmap ───────── */
.heatmap {
  display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px;
}
.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 3px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.04);
}

/* ───────── Misc ───────── */
.divider-text {
  display: flex; align-items: center; gap: 12px;
  color: var(--ink-soft); font-size: 12px;
  font-family: 'K2D';
}
.divider-text::before, .divider-text::after {
  content: ''; flex: 1; height: 1px; background: var(--glass-line);
}

.tag-violet {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  background: rgba(140,100,255,0.14);
  border: 1px solid var(--violet-edge);
  color: var(--violet-bright);
  font-family: 'K2D'; font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em;
}

/* ───────── Watermark utility ───────── */
.watermark {
  position: absolute; pointer-events: none; opacity: 0.05;
  color: var(--ink);
}

/* ───────── State examples spec rail ───────── */
.spec-row {
  display: flex; align-items: flex-start; gap: 24px;
  padding: 18px 22px; border-bottom: 1px solid var(--glass-line);
}
.spec-row:last-child { border-bottom: 0; }
.spec-meta {
  width: 200px; flex-shrink: 0;
  font-family: system-ui, sans-serif;
  font-size: 11px; line-height: 1.6; letter-spacing: 0.02em;
  color: var(--ink-soft);
}
.spec-meta b { color: var(--ink); font-weight: 600; display: block; margin-bottom: 4px; letter-spacing: 0.04em; }
.spec-mono { font-family: 'Chakra Petch', monospace; color: var(--ink-mute); font-size: 11px; }

</style>
  <style>
    html, body { margin: 0; padding: 0; background: #06080d; font-family: 'K2D', system-ui, sans-serif; color: #fff; }
    body { -webkit-font-smoothing: antialiased; }
    /* Override design canvas surface to be dark */
    #root { background: #06080d; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="poses.jsx"></script>
  <script type="text/babel" src="brand.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens2.jsx"></script>
  <script type="text/babel" src="screens3.jsx"></script>
  <script type="text/babel" src="specs.jsx"></script>
  <script type="text/babel" src="anim.jsx"></script>
  <script type="text/babel" src="errors.jsx"></script>
  <script type="text/babel" src="review.jsx"></script>

  <script type="text/babel">
    // ─── 4-screen composite ─────────────────────────────────────
    function Composite() {
      const screens = [
        { id: 'c-signin',    label: 'Sign in',    el: <SignInScreen/> },
        { id: 'c-home',      label: 'Home',       el: <HomeScreen/> },
        { id: 'c-templates', label: 'Templates',  el: <TemplatesScreen/> },
        { id: 'c-progress',  label: 'Progress',   el: <ProgressScreen/> },
      ];
      return (
        <div className="saifit-bg saifit-root" style={{
          padding: 56, borderRadius: 32,
          width: 'fit-content',
        }}>
          {/* Header */}
          <div style={{ marginBottom: 36, maxWidth: 720 }}>
            <div className="t-label" style={{ marginBottom: 10 }}>SAIFIT · GYMPAL</div>
            <h1 style={{
              margin: 0, fontFamily: 'K2D', fontWeight: 700, fontSize: 38,
              color: 'var(--ink)', letterSpacing: '-0.02em', lineHeight: 1.1,
            }}>
              ติดตามการออกกำลังกาย
              <span style={{ color: 'var(--violet-bright)' }}> · </span>
              <span style={{ fontFamily: 'Chakra Petch' }}>Dark glass</span> system
            </h1>
            <div style={{
              marginTop: 14, fontFamily: 'K2D', fontSize: 15, color: 'var(--ink-mute)',
              lineHeight: 1.6, maxWidth: 600,
            }}>
              Mobile PWA · 390×844 · iPhone 14 · Thai primary, Chakra Petch numerics.
              Glass surfaces over a near-black blue-tinted bg, accent oklch(72% 0.20 270) reserved for highlight + interaction.
            </div>
          </div>

          {/* Phones row */}
          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(4, auto)', gap: 36,
            position: 'relative',
          }}>
            {screens.map(s => (
              <div key={s.id} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
                <div style={{ transform: 'scale(0.75)', transformOrigin: 'top center', height: 690 }}>
                  {s.el}
                </div>
                <div style={{
                  fontFamily: 'system-ui', fontSize: 11, letterSpacing: '0.18em',
                  textTransform: 'uppercase', color: 'var(--ink-mute)', fontWeight: 600,
                }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── App: design canvas ─────────────────────────────────────
    function App() {
      return (
        <DesignCanvas
          title="Saifit · GymPal"
          subtitle="Dark glassmorphism · Mobile PWA · Thai-primary"
          background="#06080d"
        >
          <DCSection id="composite" title="Hero composite" subtitle="Sign-in · Home · Templates · Progress">
            <DCArtboard id="composite-row" label="4-screen composite · 390×844 · scaled 75%" width={1700} height={920}>
              <Composite/>
            </DCArtboard>
          </DCSection>

          <DCSection id="screens" title="Screens" subtitle="Full-fidelity mobile mockups">
            <DCArtboard id="signin"      label="01 · Sign in"      width={W} height={H}>
              <SignInScreen/>
            </DCArtboard>
            <DCArtboard id="home"        label="02 · Home"         width={W} height={H}>
              <HomeScreen/>
            </DCArtboard>
            <DCArtboard id="templates"   label="03 · Templates"    width={W} height={H}>
              <TemplatesScreen activeFilter="all"/>
            </DCArtboard>
            <DCArtboard id="progress"    label="04 · Progress · Records"  width={W} height={H}>
              <ProgressScreen/>
            </DCArtboard>
            <DCArtboard id="onboarding"  label="05 · Onboarding · Step 1 · Goal"  width={W} height={H}>
              <OnboardingScreen selected="muscle"/>
            </DCArtboard>
          </DCSection>

          <DCSection id="active" title="Active workout" subtitle="Set logger · rest timer · summary">
            <DCArtboard id="aw-logging" label="11 · Active · logging set"  width={W} height={H}>
              <ActiveWorkoutScreen state="logging"/>
            </DCArtboard>
            <DCArtboard id="aw-resting" label="12 · Active · rest timer 1:18 / 3:00"  width={W} height={H}>
              <ActiveWorkoutScreen state="resting" restTotal={180} restRemain={78}/>
            </DCArtboard>
            <DCArtboard id="aw-summary" label="13 · Workout summary · new PR"  width={W} height={H}>
              <WorkoutSummaryScreen/>
            </DCArtboard>
          </DCSection>

          <DCSection id="brand" title="Brand · Logo + favicon" subtitle="Mark · wordmark · app icons · favicon sizes">
            <DCArtboard id="brand-sheet" label="Saifit identity sheet" width={1180} height={1380}>
              <BrandSheet/>
            </DCArtboard>
          </DCSection>

          <DCSection id="personal" title="Personal program" subtitle="Lifting · Running · Nutrition">
            <DCArtboard id="running"  label="06 · Running plan · Week 4 of 12" width={W} height={H}>
              <RunningScreen/>
            </DCArtboard>
            <DCArtboard id="food"     label="07 · Food plan · 2,100 kcal cut"   width={W} height={H}>
              <FoodScreen/>
            </DCArtboard>
            <DCArtboard id="library"  label="08 · Exercise library"             width={W} height={H}>
              <LibraryScreen lang="th" activeFilter="all"/>
            </DCArtboard>
            <DCArtboard id="detail"   label="09 · Exercise detail · Squat"      width={W} height={H}>
              <ExerciseDetailScreen lang="th"/>
            </DCArtboard>
            <DCArtboard id="settings" label="10 · Settings · ภาษาไทย"            width={W} height={H}>
              <SettingsScreen lang="th"/>
            </DCArtboard>
          </DCSection>

          <DCSection id="i18n" title="Internationalization" subtitle="ภาษาไทย ↔ English">
            <DCArtboard id="i18n-board" label="i18n · before / after" width={1280} height={1100}>
              <I18nCompareBoard/>
            </DCArtboard>
          </DCSection>

          <DCSection id="body" title="Body analysis" subtitle="Composition · trend · measurements · photos">
            <DCArtboard id="body-analysis" label="14 · Body analysis · self-tracking" width={W} height={H}>
              <BodyAnalysisScreen/>
            </DCArtboard>
          </DCSection>

          <DCSection id="anim" title="Exercise animations" subtitle="13-animation motion system · SMIL loops · muscle maps">
            <DCArtboard id="anim-board" label="Animation system · storyboards · contexts · coverage" width={1280} height={2280}>
              <AnimationBoard/>
            </DCArtboard>
          </DCSection>

          <DCSection id="errors" title="Errors + empty states" subtitle="Offline · 404 · 500 · permission · sync conflict · empty">
            <DCArtboard id="err-offline"     label="E1 · Offline · queued sync"            width={W} height={H}>
              <OfflineScreen/>
            </DCArtboard>
            <DCArtboard id="err-404"         label="E2 · 404 · not found"                  width={W} height={H}>
              <NotFoundScreen/>
            </DCArtboard>
            <DCArtboard id="err-500"         label="E3 · 500 · server error"               width={W} height={H}>
              <ServerErrorScreen/>
            </DCArtboard>
            <DCArtboard id="err-maint"       label="E4 · Maintenance · scheduled"          width={W} height={H}>
              <MaintenanceScreen/>
            </DCArtboard>
            <DCArtboard id="err-perm"        label="E5 · Permission · notifications off"   width={W} height={H}>
              <PermissionDeniedScreen/>
            </DCArtboard>
            <DCArtboard id="err-conflict"    label="E6 · Sync conflict · 2 versions"       width={W} height={H}>
              <SyncConflictScreen/>
            </DCArtboard>
            <DCArtboard id="empty-workouts"  label="E7 · Empty · no workouts yet"          width={W} height={H}>
              <EmptyWorkoutsScreen/>
            </DCArtboard>
            <DCArtboard id="empty-prs"       label="E8 · Empty · no PRs yet"               width={W} height={H}>
              <EmptyPRsScreen/>
            </DCArtboard>
            <DCArtboard id="err-patterns"    label="Error patterns · toast · inline · banner"  width={1100} height={1080}>
              <ErrorPatternsBoard/>
            </DCArtboard>
          </DCSection>

          <DCSection id="review" title="Sprint review" subtitle="Annotated feedback from UX · Tech · Trainer">
            <DCArtboard id="review-board" label="Sprint 04 · 21 notes across 14 screens" width={1280} height={2280}>
              <SprintReviewBoard/>
            </DCArtboard>
          </DCSection>

          <DCSection id="poses" title="Pose library" subtitle="8 SVG figures · thumb + highlighted">
            <DCArtboard id="pose-sheet" label="Pose sheet · 8 exercises" width={920} height={1080}>
              <PoseSheet/>
            </DCArtboard>
          </DCSection>

          <DCSection id="components" title="Component sheet" subtitle="Glass · buttons · inputs · nav · type · color">
            <DCArtboard id="component-sheet" label="Component sheet" width={960} height={1380}>
              <ComponentSheet/>
            </DCArtboard>
          </DCSection>

          <DCSection id="states" title="States" subtitle="Idle · hover · pressed · focused · selected">
            <DCArtboard id="states-sheet" label="Interaction states" width={960} height={780}>
              <StateExamples/>
            </DCArtboard>
          </DCSection>

          <DCSection id="alts" title="Sign-in states" subtitle="Empty → focused → submitting">
            <DCArtboard id="signin-empty"   label="Sign in · empty"     width={W} height={H}>
              <SignInScreen/>
            </DCArtboard>
            <DCArtboard id="signin-focus"   label="Sign in · email focus"  width={W} height={H}>
              <SignInScreen focusedField="email"/>
            </DCArtboard>
            <DCArtboard id="signin-pressed" label="Sign in · pressed"   width={W} height={H}>
              <SignInScreen pressed/>
            </DCArtboard>
          </DCSection>

          <DCSection id="onboarding-states" title="Onboarding selection" subtitle="One state per goal">
            <DCArtboard id="ob-muscle"  label="Selected · สร้างกล้าม"  width={W} height={H}>
              <OnboardingScreen selected="muscle"/>
            </DCArtboard>
            <DCArtboard id="ob-fat"     label="Selected · ลดไขมัน"      width={W} height={H}>
              <OnboardingScreen selected="fat"/>
            </DCArtboard>
            <DCArtboard id="ob-strong"  label="Selected · แข็งแกร่ง"    width={W} height={H}>
              <OnboardingScreen selected="strong"/>
            </DCArtboard>
            <DCArtboard id="ob-fit"     label="Selected · กระฉับกระเฉง"  width={W} height={H}>
              <OnboardingScreen selected="fit"/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    // expose globals for App scope
    const W = 390, H = 844;
    Object.assign(window, { Composite, App });

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
